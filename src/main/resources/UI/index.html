<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
	<script src="app.js" defer></script>
</head>

<body>
	<header>
		<div id="nav">
			<div id="logo">
			</div>
			<button id="add-btn">+ Add Employee</button>
			<button id="delete-btn">🗑️ Delete</button>
			<select id="sort-select">
				<option value="employeeName,asc">Name A→Z (Ascending)</option>
				<option value="employeeName,desc">Name Z→A (Descending)</option>
				<option value="joinDate,asc">Join Date (Ascending)</option>
				<option value="joinDate,desc">Join Date (Descending)</option>
				<option value="salary,asc">Salary (Ascending)</option>
				<option value="salary,desc">Salary (Descending)</option>
				<option value="age,asc">Age (Ascending)</option>
				<option value="age,desc">Age (Descending)</option>
				<option value="position,asc">Position (Ascending)</option>
				<option value="position,desc">Position (Descending)</option>
			</select>
			<input type="text" id="search-input" placeholder="Search employees...">
		</div>
	</header>
	<main>
		<div class="table-wrap">
			<div id="table-container">
				<table>
					<thead>
						<tr>
							<th><input type="checkbox" id="all"></th>
							<th><button id="head-name" value="employeeName">Employee Name</button></th>
							<th><button id="head-age" value="employeeAge">Age</button></th>
							<th><button id="head-position" value="position">Position</button></th>
							<th><button id="head-salary" value="salary">Salary</button></th>
							<th><button id="head-joinDate" value="joinDate">Join Date</button></th>
							<th><button id="head-reportTo" value="reportTo">Report To</button></th>
							<th><button>Action</button></th>
						</tr>
					</thead>
					<tbody id="table-body"></tbody>
				</table>
			</div>
		</div>
		<div id="pagination">
			<Button id="prev-page">Previous</Button>
			<div id="curr-page"></div>
			<Button id="next-page">Next</Button>
		</div>
		<div class="alert">
			<div class="alert-heading">NOTIFICATION</div>
			<span class="alert-message"></span>
		</div>
		<div id="take-input">
			<div id="input-heading">Some records could not be deleted — they are referenced by other employees.
			</div>
			<div id="input-subheading">Do you want to delete the remaining records?</div>
			<div id="input-buttons">
				<button id="yes">Yes</button>
				<button id="no">No</button>
			</div>
		</div>

		<div id="add-form">
			<div id="employee-add">Employee Details</div>
			<!-- <button id="random-btn">Random Data</button> -->
			<button id="cross">✖</button>
			<form id="add-form-form">
				<div class="full">
					<label for="employeeName">Name</label>
					<input id="employeeName" type="text" class="input-form" name="employeeName" placeholder="Raj Kar"
						required>
					<span class="field-error" id="employeeName-error"></span>
				</div>

				<div>
					<label for="employeeAge">Age</label>
					<input id="employeeAge" type="number" class="input-form" name="employeeAge" placeholder="21"
						required>
					<span class="field-error" id="employeeAge-error"></span>
				</div>

				<div>
					<label for="position">Position</label>
					<select id="position" name="position" required>
						<option value="">-- Select Position --</option>
						<option value="SDE">SDE</option>
						<option value="SDE II">SDE II</option>
						<option value="Senior SDE">Senior SDE</option>
						<option value="Intern">Intern</option>
						<option value="Team Lead">Team Lead</option>
						<option value="Engineering Manager">Engineering Manager</option>
						<option value="DevOps Engineer">DevOps Engineer</option>
						<option value="QA Engineer">QA Engineer</option>
						<option value="Product Manager">Product Manager</option>
						<option value="Data Analyst">Data Analyst</option>
						<option value="Backend Developer">Backend Developer</option>
						<option value="Frontend Developer">Frontend Developer</option>
						<option value="Full Stack Developer">Full Stack Developer</option>
						<option value="Cloud Architect">Cloud Architect</option>
						<option value="Other">Other</option>
					</select>
					<span class="field-error" id="position-error"></span>

				</div>

				<div>
					<label for="salary">Salary</label>
					<input id="salary" type="number" class="input-form" name="salary" step="0.01" placeholder="10000.0"
						required>
					<span class="field-error" id="position-error"></span>

				</div>

				<div>
					<label for="reportTo">Reports To</label>
					<select id="report-to" class="input-form">Report to

					</select>
				</div>

				<div>
					<label for="joinDate">Join Date</label>
					<input id="joinDate" type="date" id="joinDate" class="input-form" name="joinDate"
						placeholder="09/09/2020">
				</div>


				<input type="button" value="Add Employee" id="submit-btn">

			</form>
			<div class="alert-form">
				<span class="alert-form-message"></span>
			</div>
		</div>
	</main>
	<footer>

	</footer>
</body>

</html>
